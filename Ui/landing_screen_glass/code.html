<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Age Insight - Liquid Glass Experience</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .organic-blob {
            filter: blur(80px);
            z-index: -1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/20 organic-blob"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-500/10 organic-blob"></div>
<div class="absolute top-[20%] right-[10%] w-[30%] h-[30%] rounded-full bg-primary/10 organic-blob"></div>
<div class="relative flex min-h-screen w-full flex-col">
<header class="flex items-center justify-between px-6 py-6 md:px-20 lg:px-40">
<div class="flex items-center gap-3">
<div class="p-2 rounded-lg bg-primary/20">
<span class="material-symbols-outlined text-primary text-2xl">hourglass_empty</span>
</div>
<h2 class="text-xl font-extrabold tracking-tight">Age Insight</h2>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="size-10 rounded-full border-2 border-primary/30 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATuKnYvcBMWnS4y88huxYylN-9pfNN_DDC2t_dX-w22eeNt77r4pLhgvQQKlQoGw9SpGDD-UQbHfI2HV2vh2SN7mVCQxDdpAKyVThhFj_7ppGCYlslTfcvkE29PI1akYlLZMkQn0nqyc3FCaD-3spP_1KMJqAVll1sfkpvKEGgf9wUQGqVCVgrAJOta-UhB0mKiKPs5h90HNlxdMpLn7NMsZk29e67lDyfMoS50m6TrTpobApQX6F_PghKEyubsNWLXaTzTqS0nO0"/>
</div>
</div>
</header>
<main class="flex-1 flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[520px] liquid-glass rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<div class="text-center mb-10">
<h1 class="text-5xl md:text-6xl font-black tracking-tighter mb-4 text-slate-900 dark:text-white">
                        AGE <span class="text-primary">INSIGHT</span>
</h1>
<p class="text-lg text-slate-600 dark:text-slate-400 font-medium">Discover your exact age down to the second</p>
</div>
<div class="space-y-8">
<div class="flex flex-col gap-2">
<label class="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-500 ml-1">
                            Date of Birth
                        </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">calendar_month</span>
<input class="w-full h-16 pl-12 pr-4 rounded-xl border border-slate-200 dark:border-white/10 bg-white/5 dark:bg-black/20 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none text-lg transition-all placeholder:text-slate-400" placeholder="DD / MM / YYYY" type="text"/>
</div>
</div>
<button class="group relative w-full h-16 rounded-xl overflow-hidden bg-primary font-bold text-lg text-white shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all active:scale-[0.98]">
<div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/10 to-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative flex items-center justify-center gap-2">
                            Calculate Age
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</div>
<div class="mt-12 grid grid-cols-3 gap-4 border-t border-white/10 pt-8">
<div class="text-center">
<p class="text-2xl font-bold text-slate-900 dark:text-white">1.2M+</p>
<p class="text-[10px] uppercase tracking-wider text-slate-500">Calculations</p>
</div>
<div class="text-center border-x border-white/5">
<p class="text-2xl font-bold text-slate-900 dark:text-white">99.9%</p>
<p class="text-[10px] uppercase tracking-wider text-slate-500">Accuracy</p>
</div>
<div class="text-center">
<p class="text-2xl font-bold text-slate-900 dark:text-white">50+</p>
<p class="text-[10px] uppercase tracking-wider text-slate-500">Metrics</p>
</div>
</div>
</div>
</main>
<footer class="py-8 px-6 text-center">
<p class="text-sm text-slate-500">
                © 2024 Age Insight. Precision in every second.
            </p>
</footer>
</div>
</body></html>
